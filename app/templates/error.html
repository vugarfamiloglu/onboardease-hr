{% extends 'base.html' %}
{% block heading %}Error {{ code }}{% endblock %}
{% block crumb %}Error{% endblock %}
{% block content %}
<div class="card card-pad" style="text-align:center;padding:64px 20px">
  <div style="font-family:var(--font-display);font-size:54px;font-weight:700;color:var(--primary)">{{ code }}</div>
  <p class="muted" style="margin-top:6px">{{ message }}</p>
  <a class="btn btn-primary" href="{{ url_for('dashboard.index') }}" style="margin-top:18px">Back to dashboard</a>
</div>
{% endblock %}
